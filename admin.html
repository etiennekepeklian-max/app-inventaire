<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Administration</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B56">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if (!localStorage.getItem('app_token') || localStorage.getItem('app_role') !== 'admin') { 
            window.location.href = 'index.html'; 
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(to top, #050A1F 0%, #1A2B56 100%); color: #FFFFFF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; position: relative; }
        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .btn-retour { color: #FFFFFF; text-decoration: none; font-size: 1.5rem; position: absolute; left: 0; background: none; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-retour:active { transform: scale(0.85); }
        h1 { text-align: center; font-size: 1.5rem; width: 100%; letter-spacing: 1px; }

        .admin-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        .nav-tile { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 12px 5px; text-align: center; font-size: 0.85rem; font-weight: bold; cursor: pointer; color: #FFFFFF; transition: all 0.2s; }
        .nav-tile.active { background: #3B82F6; border-color: #60A5FA; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

        .admin-section { display: none; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; padding: 15px; flex-direction: column; gap: 15px; }
        .admin-section.active { display: flex; }

        .widget-row { display: flex; gap: 10px; }
        .widget { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px; text-align: center; }
        .widget-num { font-size: 1.6rem; font-weight: 900; color: #FFFFFF; }
        .widget-label { font-size: 0.7rem; color: #D1D5DB; text-transform: uppercase; margin-top: 2px; }
        .widget-meteo { font-size: 1.8rem; line-height: 1; }

        .list-panel { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .list-panel h3 { font-size: 0.9rem; color: #60A5FA; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .panel-row { font-size: 0.8rem; color: #D1D5DB; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #D1D5DB; font-weight: bold; }
        input, select, textarea { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; padding: 12px; color: #FFFFFF; font-size: 1rem; width: 100%; outline: none; }
        
        .btn-action { background-color: #3B82F6; border: none; padding: 14px; border-radius: 8px; color: #FFFFFF; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 100%; font-size: 1rem; }
        .btn-action:active { transform: scale(0.95); }
        
        /* Styles Diagnostics */
        .diag-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); }

        .app-version { position: absolute; bottom: 10px; right: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><button class="btn-retour" onclick="history.back()">⬅</button><h1>Administration</h1></div>
        
        <div class="admin-nav">
            <div class="nav-tile active" onclick="switchSection('sect-dash', this)">📊 Dashboard</div>
            <div class="nav-tile" onclick="switchSection('sect-struct', this)">🏷️ Data Struct.</div>
            <div class="nav-tile" onclick="switchSection('sect-csv', this)">📥 CSV Flux</div>
            <div class="nav-tile" onclick="switchSection('sect-team', this)">👥 Équipe</div>
            <div class="nav-tile" onclick="switchSection('sect-diag', this)" style="grid-column: span 2;">🩺 Diagnostics Système</div>
        </div>

        <div class="admin-section active" id="sect-dash">
            <div class="widget-row">
                <div class="widget"><div class="widget-num" id="stat-actif">-</div><div class="widget-label">Actifs</div></div>
                <div class="widget"><div class="widget-num" id="stat-sorti">-</div><div class="widget-label">Sortis</div></div>
            </div>
            <div class="list-panel">
                <h3>🚨 FIL D'ALERTE DES ANOMALIES</h3>
                <div id="panel-anomalies"><p style="font-size:0.8rem;color:#9CA3AF;">Chargement...</p></div>
            </div>
        </div>

        <div class="admin-section" id="sect-struct">
            </div>

        <div class="admin-section" id="sect-csv">
            </div>

        <div class="admin-section" id="sect-team">
            </div>

        <div class="admin-section" id="sect-diag">
            <h3 style="color:#60A5FA;">🩺 Diagnostic de santé</h3>
            <div id="diag-results" style="margin-bottom:10px;">Cliquez pour vérifier l'état du système.</div>
            <button class="btn-action" onclick="runDiagnostics()" style="background:#8B5CF6;">Lancer le contrôle</button>
        </div>
    </div>

    <div class="app-version" id="version-display">Version 0.9</div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        const payloadBase = { login: localStorage.getItem('app_login'), token: localStorage.getItem('app_token') };
        
        function switchSection(id, tile) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tile').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active'); tile.classList.add('active');
        }

        async function runDiagnostics() {
            const container = document.getElementById('diag-results');
            container.innerHTML = "Contrôle en cours... ⏳";
            let results = [];
            
            // Ping Serveur
            let start = Date.now();
            try {
                await fetch(GOOGLE_SCRIPT_URL, {method:'POST', body: JSON.stringify({...payloadBase, action:"get_dashboard"})});
                results.push({name: "Connexion Serveur", status: "🟢 OK ("+(Date.now()-start)+"ms)"});
            } catch(e) { results.push({name: "Connexion Serveur", status: "🔴 ÉCHEC"}); }

            // Caméra
            try {
                let stream = await navigator.mediaDevices.getUserMedia({video: true});
                stream.getTracks().forEach(track => track.stop());
                results.push({name: "Accès Caméra", status: "🟢 OK"});
            } catch(e) { results.push({name: "Accès Caméra", status: "🔴 BLOQUÉ"}); }

            container.innerHTML = results.map(r => `<div class="diag-item"><span>${r.name}</span><span style="font-weight:bold;">${r.status}</span></div>`).join('');
        }
        
        // ... (tes fonctions précédentes : chargerDashboard, chargerCategories, etc.) ...
    </script>
</body>
</html>
