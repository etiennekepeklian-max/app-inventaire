<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter / Corriger un Objet</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if (!localStorage.getItem('app_token') || !localStorage.getItem('app_login')) { 
            window.location.href = 'login.html'; 
        }
        if (localStorage.getItem('app_role') === 'lecteur') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        /* 🎨 PALETTE "SLATE" ET VARIABLES GLASSMORPHISM */
        :root {
            --bg-dark: #0F172A; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --accent-blue: #3B82F6;
            --accent-blue-hover: #2563EB;
            --accent-green: #10B981;
            --accent-red: #EF4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            padding-bottom: 50px; position: relative; 
        }

        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .btn-retour { color: var(--text-main); text-decoration: none; font-size: 1.5rem; position: absolute; left: 0; background: none; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-retour:active { transform: scale(0.85); }
        h1 { text-align: center; font-size: 1.5rem; width: 100%; letter-spacing: 1px; font-weight: 800; text-transform: uppercase; }

        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px 20px; 
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .row-inline { display: flex; gap: 8px; align-items: flex-end; }
        .row-inline input { flex: 1; }
        
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            background-color: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            border-radius: 10px; padding: 14px; color: var(--text-main); font-size: 1rem; width: 100%; 
            outline: none; transition: border-color 0.2s, background-color 0.2s; 
        }
        input:focus, select:focus, textarea:focus { border-color: #60A5FA; background-color: rgba(0, 0, 0, 0.3); }
        option { background-color: #1E293B; color: white; }

        .btn-scan-input { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: white; font-size: 1.3rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; width: 55px; height: 50px; 
            transition: transform 0.2s, background-color 0.2s; 
        }
        .btn-scan-input:active { background: var(--glass-highlight); transform: scale(0.9); }

        .btn-action { 
            background-color: var(--accent-blue); border: none; padding: 16px; border-radius: 12px; 
            color: #FFFFFF; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-action:active { transform: scale(0.96); background-color: var(--accent-blue-hover); }
        .btn-action:disabled { background-color: #64748B; cursor: not-allowed; box-shadow: none; transform: scale(1); }
        
        .btn-print { background: var(--accent-green); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); display: none; }

        /* 🌟 UI GALERIE PHOTOS AVANCÉE */
        .photo-upload-zone {
            border: 2px dashed var(--glass-border); background: rgba(0,0,0,0.1);
            padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; 
            transition: background 0.3s, border-color 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .photo-upload-zone:active { background: rgba(255,255,255,0.05); border-color: var(--accent-blue); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        
        .photo-wrapper { position: relative; display: inline-block; width: 100%; }
        .photo-preview { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }
        .btn-delete-photo { position: absolute; top: -6px; right: -6px; background: var(--accent-red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); font-size: 0.9rem; }

        #scanner-box { display: none; background: rgba(0, 0, 0, 0.4); padding: 10px; border-radius: 16px; border: 1px solid var(--glass-border); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; }

        /* Bouton d'Aide Global Flottant */
        .btn-global-help {
            position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; text-decoration: none; color: var(--text-main);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 1000;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
        }
        .btn-global-help:active { transform: scale(0.85); background-color: var(--glass-highlight); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-dark); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-title { font-size: 1.2rem; color: white; margin-bottom: 10px; font-weight: 800; }
        .modal-message { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
        .btn-modal-ok { background: var(--accent-blue); border: none; color: #FFFFFF; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.05rem; }

        .app-version { position: absolute; bottom: 10px; left: 15px; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
    </style>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <div class="header"><button class="btn-retour" onclick="triggerHaptic(); history.back()">⬅</button><h1>Ajouter / Corriger</h1></div>

        <!-- ZONE INTERFACE SCAN RAPIDE -->
        <div id="scanner-box">
            <div id="reader"></div>
            <button class="btn-action" onclick="fermerScannerCam()" style="background:rgba(239, 68, 68, 0.1); border:1px solid rgba(248, 113, 113, 0.4); color:#FCA5A5; margin-top:10px; padding:12px; box-shadow:none;">❌ Annuler le scan</button>
        </div>

        <form id="form-ajouter" class="glass-card">
            <!-- Nom de l'objet -->
            <div class="form-group">
                <label for="input-nom">Nom de l'objet / Article</label>
                <input type="text" id="input-nom" placeholder="Ex: Vase en porcelaine" required>
            </div>

            <!-- Référence avec Scan Commercial intégré -->
            <div class="form-group">
                <label for="input-ref">Référence (Code Commercial ou Interne)</label>
                <div class="row-inline">
                    <input type="text" id="input-ref" placeholder="Génération auto ou scan..." required>
                    <button type="button" class="btn-scan-input" onclick="ouvrirScannerCam()" title="Scanner un code existant">📷</button>
                </div>
            </div>

            <!-- Catégorie (Déroulant dynamique) -->
            <div class="form-group">
                <label for="select-cat">Catégorie</label>
                <select id="select-cat" required>
                    <option value="">Chargement des catégories...</option>
                </select>
            </div>

            <!-- Emplacement initial (Déroulant dynamique) -->
            <div class="form-group">
                <label for="select-emp">Emplacement Initial</label>
                <select id="select-emp" required>
                    <option value="">Chargement des zones...</option>
                </select>
            </div>

            <!-- NOUVEAU : Galerie Photos HD avec choix Galerie / Caméra -->
            <div class="form-group">
                <label>Galerie d'État (Max 3 photos)</label>
                <div style="display: flex; gap: 10px;">
                    <label class="photo-upload-zone" style="flex:1;" for="photo-input-file" onclick="triggerHaptic()">
                        <div style="font-size: 1.5rem; margin-bottom: 5px;">📁</div>
                        <span style="color: var(--text-muted); font-size: 0.85rem;">Galerie</span>
                        <input type="file" id="photo-input-file" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
                    </label>
                    <label class="photo-upload-zone" style="flex:1;" for="photo-input-cam" onclick="triggerHaptic()">
                        <div style="font-size: 1.5rem; margin-bottom: 5px;">📷</div>
                        <span style="color: var(--text-muted); font-size: 0.85rem;">Instantané</span>
                        <input type="file" id="photo-input-cam" accept="image/*" capture="environment" style="display:none" onchange="addPhotos(this)">
                    </label>
                </div>
                <div class="photo-grid" id="photo-grid"></div>
            </div>

            <!-- Remarques additionnelles -->
            <div class="form-group">
                <label for="input-note">Notes / Suivi des Incidents</label>
                <textarea id="input-note" rows="3" placeholder="Caractéristiques, état, remarques particulières..."></textarea>
            </div>

            <!-- Actions -->
            <button type="submit" class="btn-action" id="btn-submit-form" onclick="triggerHaptic()">💾 Enregistrer en Base</button>
            <button type="button" class="btn-action btn-print" id="btn-imprimer-qr" onclick="triggerHaptic(); imprimerEtiquetteQR()">🖨️ Imprimer l'étiquette QR</button>
        </form>
    </div>

    <!-- BOUTON D'AIDE GLOBAL -->
    <a href="aide.html" class="btn-global-help" title="Centre d'aide" onclick="triggerHaptic()">❓</a>

    <!-- Modale de Notification Custom -->
    <div class="modal-overlay" id="custom-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">✅</div>
            <h3 class="modal-title" id="modal-title">Enregistré !</h3>
            <p class="modal-message" id="modal-text">L'élément a été correctement indexé.</p>
            <button class="btn-modal-ok" id="btn-fermer-modal" onclick="triggerHaptic()">OK</button>
        </div>
    </div>

    <div class="app-version" id="version-display"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        const payloadBase = { login: localStorage.getItem('app_login'), token: localStorage.getItem('app_token') };
        let html5QrcodeScanner = null;
        let base64Photos = []; // Tableau pour stocker les photos cumulées en base64

        document.getElementById('version-display').textContent = "Version " + (localStorage.getItem('app_version') || '0.2.2');

        // 🌟 RETOUR HAPTIQUE GLOBAL (Prend en compte la désactivation dans le profil)
        window.triggerHaptic = function() {
            if (navigator.vibrate && localStorage.getItem('app_haptic_disabled') !== 'true') { 
                navigator.vibrate(40); 
            }
        };

        function afficherPopup(titre, message, isSuccess = true) {
            document.getElementById('modal-icon').textContent = isSuccess ? "✅" : "⚠️";
            document.getElementById('modal-title').textContent = titre;
            document.getElementById('modal-text').textContent = message;
            document.getElementById('custom-modal').style.display = 'flex';
            triggerHaptic();
        }
        document.getElementById('btn-fermer-modal').addEventListener('click', () => { document.getElementById('custom-modal').style.display = 'none'; });

        // 🌟 NOUVEAU : GESTION DE LA GALERIE PHOTOS HD (CUMULATIVE ET SUPPRIMABLE)
        function addPhotos(input) {
            const grid = document.getElementById('photo-grid');
            
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    if (base64Photos.length >= 3) {
                        afficherPopup("Limite atteinte", "Vous ne pouvez joindre que 3 photos maximum par objet.", false);
                        return; // Stoppe l'ajout si on dépasse 3
                    }
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const imgData = e.target.result;
                        base64Photos.push(imgData); // Ajout au tableau d'envoi
                        
                        // Création de la miniature avec bouton de suppression
                        const wrapper = document.createElement('div');
                        wrapper.className = 'photo-wrapper';
                        
                        const img = document.createElement('img');
                        img.src = imgData;
                        img.className = 'photo-preview';
                        
                        const delBtn = document.createElement('button');
                        delBtn.className = 'btn-delete-photo';
                        delBtn.innerHTML = '×';
                        delBtn.onclick = function(ev) {
                            ev.preventDefault();
                            triggerHaptic();
                            // Retirer du tableau et du DOM
                            const idx = base64Photos.indexOf(imgData);
                            if (idx > -1) base64Photos.splice(idx, 1);
                            wrapper.remove();
                        };
                        
                        wrapper.appendChild(img);
                        wrapper.appendChild(delBtn);
                        grid.appendChild(wrapper);
                    }
                    reader.readAsDataURL(file);
                });
            }
            // Réinitialisation de l'input pour permettre de reprendre une photo si besoin
            input.value = "";
        }

        // 🌟 RECHARGE ET PEUPLEMENT DES MENUS DÉROULANTS
        window.addEventListener('DOMContentLoaded', () => {
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "get_categories", ...payloadBase }) })
            .then(r => r.json()).then(d => {
                if (d.result === "success") {
                    d.data.sort((a, b) => { if(a === "Non classé") return 1; if(b === "Non classé") return -1; return a.localeCompare(b); });
                    const catSelect = document.getElementById('select-cat');
                    catSelect.innerHTML = '<option value="">-- Choisir la catégorie --</option>';
                    d.data.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);
                }
            });

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "get_emplacements", ...payloadBase }) })
            .then(r => r.json()).then(d => {
                if (d.result === "success") {
                    d.data.sort((a, b) => a.localeCompare(b));
                    const empSelect = document.getElementById('select-emp');
                    empSelect.innerHTML = '<option value="">-- Choisir le lieu --</option>';
                    d.data.forEach(e => empSelect.innerHTML += `<option value="${e}">${e}</option>`);
                }
            });
        });

        // 🌟 SYSTÈME DE GÉNÉRATION AUTOMATIQUE DE RÉFÉRENCE INTERNE
        document.getElementById('input-nom').addEventListener('input', function() {
            const refInput = document.getElementById('input-ref');
            if (refInput.value.trim() !== "" && !refInput.hasAttribute('data-auto')) return;

            let nom = this.value.trim();
            if (nom.length >= 3) {
                let prefix = nom.substring(0, 3).toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z]/g, "X");
                if(prefix.length < 3) prefix = (prefix + "XXX").substring(0, 3);
                let randomNum = Math.floor(1000 + Math.random() * 9000);
                refInput.value = prefix + "-" + randomNum;
                refInput.setAttribute('data-auto', 'true');
            } else {
                refInput.value = "";
                refInput.removeAttribute('data-auto');
            }
        });

        document.getElementById('input-ref').addEventListener('input', function() {
            this.removeAttribute('data-auto');
        });

        // 🌟 SCANNER PHOTO
        function ouvrirScannerCam() {
            triggerHaptic();
            document.getElementById('form-ajouter').style.display = 'none';
            document.getElementById('scanner-box').style.display = 'block';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText) {
            document.getElementById('input-ref').value = decodedText.trim().toUpperCase();
            document.getElementById('input-ref').removeAttribute('data-auto');
            fermerScannerCam();
            triggerHaptic();
        }

        function onScanFailure(error) {}

        function fermerScannerCam() {
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }
            document.getElementById('scanner-box').style.display = 'none';
            document.getElementById('form-ajouter').style.display = 'flex';
            triggerHaptic();
        }

        // 🌟 SOUMISSION DU FORMULAIRE ET ENREGISTREMENT
        document.getElementById('form-ajouter').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-form');
            btn.disabled = true; btn.textContent = "Transmission en base... ⏳";

            let item = {
                action: "ajouter",
                login: localStorage.getItem('app_login'),
                token: localStorage.getItem('app_token'),
                nom: document.getElementById('input-nom').value.trim(),
                reference: document.getElementById('input-ref').value.trim().toUpperCase(),
                categorie: document.getElementById('select-cat').value,
                emplacement: document.getElementById('select-emp').value,
                note: document.getElementById('input-note').value.trim(),
                photos: base64Photos // Tableau contenant de 0 à 3 photos
            };

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) })
            .then(res => res.json()).then(data => {
                if (data.result === "success") {
                    afficherPopup("Enregistré !", `L'objet "${item.nom}" est synchronisé.`);
                    document.getElementById('btn-imprimer-qr').style.display = 'flex';
                    
                    // On maintient le bouton actif pour permettre une correction
                    btn.disabled = false;
                    btn.textContent = "💾 Mettre à jour la fiche";
                } else {
                    afficherPopup("Erreur", data.message, false);
                    btn.disabled = false; btn.textContent = "💾 Enregistrer en Base";
                }
            }).catch(() => {
                afficherPopup("Erreur Réseau", "Vérifiez votre connexion internet.", false);
                btn.disabled = false; btn.textContent = "💾 Enregistrer en Base";
            });
        });

        // 🌟 IMPRESSION STRICTE DE L'ÉTIQUETTE QR
        function imprimerEtiquetteQR() {
            const ref = document.getElementById('input-ref').value.trim().toUpperCase();
            const nom = document.getElementById('input-nom').value.trim();
            if (!ref) return;

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            const doc = iframe.contentWindow.document;
            
            doc.write(`
                <html>
                <head>
                    <style>
                        body { text-align: center; font-family: Arial, sans-serif; padding-top: 20px; color: #333; }
                        img.logo { width: 55px; margin-bottom: 6px; }
                        div.box { border: 1px dashed #666; padding: 15px; width: 180px; margin: 0 auto; border-radius: 8px; }
                        div.title { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; word-wrap: break-word; }
                        div.ref { font-size: 0.8rem; font-family: monospace; color: #444; margin-top: 5px; }
                    </style>
                </head>
                <body>
                    <div class="box">
                        <img class="logo" src="icon-192.png"/><br>
                        <div class="title">${nom}</div>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(ref)}" onload="window.print();"/>
                        <div class="ref">${ref}</div>
                    </div>
                </body>
                </html>
            `);
            doc.close();
            setTimeout(() => { document.body.removeChild(iframe); }, 3000);
        }
    </script>
    <script>
        let timeoutId; document.addEventListener("visibilitychange", function() { if (document.hidden) { timeoutId = setTimeout(() => { localStorage.clear(); window.location.href = "login.html"; }, 30000); } else { clearTimeout(timeoutId); } });
    </script>
</body>
</html>
