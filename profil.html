<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Profil</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B56">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>if (!localStorage.getItem('app_token') || !localStorage.getItem('app_login')) { window.location.href = 'login.html'; }</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(to top, #050A1F 0%, #1A2B56 100%); color: #FFFFFF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; position: relative; }
        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 20px; position: relative; }
        
        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .btn-retour { color: #FFFFFF; text-decoration: none; font-size: 1.5rem; position: absolute; left: 0; background: none; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-retour:active { transform: scale(0.85); }
        h1 { text-align: center; font-size: 1.5rem; width: 100%; letter-spacing: 1px; }

        .profile-card { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px 20px; text-align: center; margin-bottom: 10px; }
        .profile-icon { font-size: 4rem; margin-bottom: 10px; }
        .profile-name { font-size: 1.3rem; font-weight: bold; color: #60A5FA; margin-bottom: 5px; }
        .profile-role { font-size: 0.9rem; color: #D1D5DB; text-transform: uppercase; letter-spacing: 1px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; display: inline-block; }

        .section-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .section-title { font-size: 1rem; color: #60A5FA; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; text-align: left; }

        .form-group { display: flex; flex-direction: column; gap: 5px; text-align: left; }
        label { font-size: 0.85rem; color: #D1D5DB; font-weight: bold; }
        input { background-color: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; padding: 12px; color: #FFFFFF; font-size: 1rem; outline: none; width: 100%; transition: border-color 0.2s; }
        input:focus { border-color: #60A5FA; }

        .btn-primary { background-color: #3B82F6; border: none; padding: 14px; border-radius: 8px; color: #FFFFFF; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .btn-primary:active { transform: scale(0.95); background-color: #2563EB; }
        .btn-danger { background-color: transparent; border: 1px solid #EF4444; color: #FCA5A5; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .btn-danger:active { background-color: rgba(239,68,68,0.1); transform: scale(0.95); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background-color: #1A2B56; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-title { font-size: 1.2rem; color: white; margin-bottom: 10px; }
        .modal-message { color: #D1D5DB; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
        .btn-modal-ok { background: #3B82F6; border: none; color: #FFFFFF; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: transform 0.2s; font-size: 1.05rem; }

        .app-version { position: absolute; bottom: 10px; right: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><button class="btn-retour" onclick="history.back()">⬅</button><h1>Mon Profil</h1></div>
        
        <div class="profile-card">
            <div class="profile-icon">👤</div>
            <div class="profile-name" id="display-login">...</div>
            <div class="profile-role" id="display-role">...</div>
        </div>

        <form id="form-mdp" class="section-box">
            <div class="section-title">🔒 Modifier mon mot de passe</div>
            <div class="form-group">
                <label>Ancien mot de passe</label>
                <input type="password" id="ancien-mdp" required>
            </div>
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="nouveau-mdp" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:5px;">Enregistrer</button>
        </form>

        <div class="section-box">
            <div class="section-title">🛠️ Maintenance</div>
            <p style="font-size: 0.85rem; color: #D1D5DB; margin-bottom: 5px;">Si l'application rencontre un bug d'affichage ou des données obsolètes, vous pouvez forcer le nettoyage du cache.</p>
            <button id="btn-vider-cache" class="btn-danger">🧹 Vider le cache de l'application</button>
        </div>
    </div>

    <div class="modal-overlay" id="custom-alert">
        <div class="modal-content">
            <div class="modal-icon" id="alert-icon">✅</div>
            <h3 class="modal-title" id="alert-title">Succès</h3>
            <p class="modal-message" id="alert-message">Action effectuée.</p>
            <button class="btn-modal-ok" id="btn-alert-ok">OK</button>
        </div>
    </div>

    <div class="app-version" id="version-display"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        
        document.getElementById('display-login').textContent = localStorage.getItem('app_login');
        let roleName = localStorage.getItem('app_role') === 'admin' ? "Administrateur" : (localStorage.getItem('app_role') === 'lecteur' ? "Lecteur Uniquement" : "Standard");
        document.getElementById('display-role').textContent = roleName;
        document.getElementById('version-display').textContent = "Version " + (localStorage.getItem('app_version') || '0.9');

        function afficherAlerte(titre, message, isSuccess = true, callback = null) {
            document.getElementById('alert-icon').textContent = isSuccess ? "✅" : "⚠️";
            document.getElementById('alert-title').textContent = titre;
            document.getElementById('alert-message').textContent = message;
            document.getElementById('custom-alert').style.display = 'flex';
            document.getElementById('btn-alert-ok').onclick = () => {
                document.getElementById('custom-alert').style.display = 'none';
                if(callback) callback();
            };
        }

        document.getElementById('form-mdp').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button'); btn.disabled = true; btn.textContent = "Mise à jour... ⏳";
            fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', body: JSON.stringify({ action: "changer_mdp", login: localStorage.getItem('app_login'), token: localStorage.getItem('app_token'), ancienPassword: document.getElementById('ancien-mdp').value, nouveauPassword: document.getElementById('nouveau-mdp').value }) 
            }).then(res => res.json()).then(data => {
                if(data.result === "success") { afficherAlerte("Succès", "Mot de passe modifié. Veuillez vous reconnecter.", true, () => { localStorage.clear(); window.location.href = 'login.html'; }); } 
                else { afficherAlerte("Erreur", data.message, false); btn.disabled = false; btn.textContent = "Enregistrer"; }
            }).catch(() => { afficherAlerte("Erreur", "Problème réseau.", false); btn.disabled = false; btn.textContent = "Enregistrer"; });
        });

        document.getElementById('btn-vider-cache').addEventListener('click', function() {
            let p = [];
            if('caches' in window) p.push(caches.keys().then(names => Promise.all(names.map(n => caches.delete(n)))));
            if('serviceWorker' in navigator) p.push(navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister()))));
            Promise.all(p).finally(() => { 
                localStorage.removeItem('miroir_stock'); localStorage.removeItem('app_categories'); localStorage.removeItem('app_emplacements');
                afficherAlerte("Cache vidé", "L'application a été nettoyée. Redémarrage requis.", true, () => { window.location.reload(); });
            });
        });
    </script>
    <script>
        let timeoutId; document.addEventListener("visibilitychange", function() { if (document.hidden) { timeoutId = setTimeout(() => { localStorage.clear(); window.location.href = "login.html"; }, 30000); } else { clearTimeout(timeoutId); } });
    </script>
</body>
</html>
