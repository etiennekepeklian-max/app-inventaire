<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B56">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(to top, #050A1F 0%, #1A2B56 100%); color: #FFFFFF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .login-box { width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 30px 25px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .app-logo { width: 100px; height: 100px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 1px; }
        
        .form-group { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
        label { font-size: 0.9rem; color: #D1D5DB; font-weight: bold; }
        input { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; padding: 14px; color: #FFFFFF; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #60A5FA; background-color: rgba(255, 255, 255, 0.15); }
        
        .btn-login { background-color: #3B82F6; border: none; padding: 16px; border-radius: 10px; color: #FFFFFF; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .btn-login:active { transform: scale(0.95); background-color: #2563EB; }
        .btn-login:disabled { background-color: #9CA3AF; transform: scale(1); }

        .error-message { color: #FCA5A5; font-size: 0.9rem; margin-top: 15px; display: none; text-align: center; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.3); width: 100%; }
        .app-version { position: absolute; bottom: 15px; font-size: 0.8rem; color: rgba(255,255,255,0.3); font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="icon-192.png" alt="Logo" class="app-logo">
        <h1>Authentification</h1>
        
        <div id="login-form-container" style="width: 100%;">
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" id="login" autocomplete="off" spellcheck="false" data-lpignore="true">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" autocomplete="new-password" spellcheck="false" data-lpignore="true">
            </div>
            <button type="button" class="btn-login" id="btn-submit">Se connecter</button>
            <div class="error-message" id="error-msg"></div>
        </div>
    </div>
    
    <div class="app-version" id="version-display">Version 0.1.1</div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        
        if (localStorage.getItem('app_version')) { 
            document.getElementById('version-display').textContent = "Version " + localStorage.getItem('app_version'); 
        }
        if (localStorage.getItem('app_token')) { 
            window.location.href = 'index.html'; 
        }

        function executerConnexion() {
            const loginInput = document.getElementById('login').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn = document.getElementById('btn-submit');

            if (!loginInput || !passwordInput) {
                errorBox.textContent = "Veuillez remplir tous les champs.";
                errorBox.style.display = 'block';
                return;
            }

            btn.disabled = true; btn.textContent = "Connexion... ⏳"; errorBox.style.display = 'none';

            fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: "login", 
                    login: loginInput, 
                    password: passwordInput 
                }) 
            })
            .then(res => res.json()).then(data => {
                if (data.result === "success") {
                    // Nettoyage immédiat des champs en mémoire pour ne laisser aucune trace au navigateur
                    document.getElementById('login').value = "";
                    document.getElementById('password').value = "";
                    
                    localStorage.setItem('app_token', data.token); 
                    localStorage.setItem('app_login', data.login); 
                    localStorage.setItem('app_role', data.role);
                    window.location.href = 'index.html';
                } else { 
                    errorBox.textContent = data.message; 
                    errorBox.style.display = 'block'; 
                    btn.disabled = false; 
                    btn.textContent = "Se connecter"; 
                }
            }).catch(() => { 
                errorBox.textContent = "Problème réseau. Vérifiez votre connexion."; 
                errorBox.style.display = 'block'; 
                btn.disabled = false; 
                btn.textContent = "Se connecter"; 
            });
        }

        document.getElementById('btn-submit').addEventListener('click', executerConnexion);

        // Simulation du comportement natif d'un formulaire pour la touche Entrée
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') executerConnexion();
        });
        document.getElementById('login').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => { 
                navigator.serviceWorker.register('./sw.js').catch(() => {}); 
            }); 
        }
    </script>
</body>
</html>
