<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - Stock Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        /* 🎨 PALETTE "SLATE" ET VARIABLES GLASSMORPHISM */
        :root {
            --bg-dark: #0F172A; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --accent-blue: #3B82F6;
            --accent-blue-hover: #2563EB;
            --accent-red: #EF4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Cercles décoratifs en arrière-plan */
        .bg-circle-1 { position: absolute; top: -10%; left: -20%; width: 300px; height: 300px; background: rgba(59, 130, 246, 0.2); border-radius: 50%; filter: blur(80px); z-index: 0; }
        .bg-circle-2 { position: absolute; bottom: -10%; right: -10%; width: 250px; height: 250px; background: rgba(16, 185, 129, 0.15); border-radius: 50%; filter: blur(80px); z-index: 0; }

        .login-container { 
            width: 90%; max-width: 380px; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 35px 25px; 
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center;
        }
        
        .logo-box { width: 80px; height: 80px; background: var(--accent-blue); border-radius: 20px; margin: 0 auto; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); margin-bottom: 10px; }
        
        h1 { font-size: 1.6rem; letter-spacing: 1px; font-weight: 800; margin-bottom: 5px; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 15px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 5px; }
        
        input { 
            background-color: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            border-radius: 12px; padding: 15px; color: var(--text-main); font-size: 1rem; width: 100%; 
            outline: none; transition: border-color 0.2s, background-color 0.2s; 
        }
        input:focus { border-color: #60A5FA; background-color: rgba(0, 0, 0, 0.3); }

        .btn-login { 
            background-color: var(--accent-blue); border: none; padding: 16px; border-radius: 14px; 
            color: #FFFFFF; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; 
            margin-top: 10px; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-login:active { transform: scale(0.96); background-color: var(--accent-blue-hover); }
        .btn-login:disabled { background-color: #64748B; cursor: not-allowed; box-shadow: none; transform: scale(1); }

        /* Modale d'alerte */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
        .modal-content { background: var(--bg-dark); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-title { font-size: 1.2rem; color: white; margin-bottom: 10px; font-weight: 800; }
        .modal-message { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
        .btn-modal-ok { background: var(--accent-blue); border: none; color: #FFFFFF; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: transform 0.2s; font-size: 1.05rem; }
        .btn-modal-ok:active { transform: scale(0.95); }

        .app-version { position: absolute; bottom: 15px; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; z-index: 10;}
    </style>
</head>
<body>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>

    <div class="login-container">
        <div>
            <div class="logo-box">📦</div>
            <h1>Stock Manager</h1>
            <p class="subtitle">Veuillez vous identifier</p>
        </div>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form-group">
                <label for="input-login">Identifiant</label>
                <input type="text" id="input-login" placeholder="Ex: Jean.Dupont" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="input-password">Mot de passe</label>
                <input type="password" id="input-password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="btn-submit">Se connecter</button>
        </form>
    </div>

    <!-- Modale de Notification (Erreurs & Verrouillage) -->
    <div class="modal-overlay" id="custom-alert">
        <div class="modal-content">
            <div class="modal-icon" id="alert-icon">⚠️</div>
            <h3 class="modal-title" id="alert-title">Erreur</h3>
            <p class="modal-message" id="alert-message">Message d'erreur.</p>
            <button class="btn-modal-ok" id="btn-alert-ok" onclick="fermerAlerte()">Compris</button>
        </div>
    </div>

    <div class="app-version">Version 0.2.1</div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";

        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function afficherAlerte(titre, message, isLocked = false) {
            triggerHaptic();
            document.getElementById('alert-icon').textContent = isLocked ? "🔒" : "⚠️";
            document.getElementById('alert-title').textContent = titre;
            document.getElementById('alert-title').style.color = isLocked ? "#FCA5A5" : "white";
            document.getElementById('alert-message').textContent = message;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function fermerAlerte() {
            triggerHaptic();
            document.getElementById('custom-alert').style.display = 'none';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            triggerHaptic();
            
            const btn = document.getElementById('btn-submit');
            const login = document.getElementById('input-login').value.trim();
            const password = document.getElementById('input-password').value;

            btn.disabled = true;
            btn.textContent = "Vérification... ⏳";

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "login", login: login, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === "success") {
                    localStorage.setItem('app_token', data.token);
                    localStorage.setItem('app_login', data.login);
                    localStorage.setItem('app_role', data.role);
                    localStorage.setItem('app_version', '0.2.1');
                    window.location.href = 'index.html';
                } else if (data.result === "locked" || data.isLocked === true) {
                    // INTERCEPTION SPÉCIFIQUE DU VERROUILLAGE
                    afficherAlerte(
                        "Compte verrouillé", 
                        "Accès restreint : votre compte est temporairement verrouillé pour des raisons de sécurité. Veuillez contacter un administrateur pour déverrouiller votre session.",
                        true
                    );
                    btn.disabled = false;
                    btn.textContent = "Se connecter";
                } else {
                    afficherAlerte("Échec", data.message || "Identifiant ou mot de passe incorrect.");
                    btn.disabled = false;
                    btn.textContent = "Se connecter";
                }
            })
            .catch(err => {
                afficherAlerte("Erreur réseau", "Impossible de joindre le serveur. Vérifiez votre connexion.");
                btn.disabled = false;
                btn.textContent = "Se connecter";
            });
        });

        // Empêcher l'utilisateur de revenir en arrière après s'être déconnecté
        window.onload = function() {
            if (localStorage.getItem('app_token')) {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
