<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit de Zone</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B56">
    <script>if (!localStorage.getItem('app_token')) window.location.href = 'login.html';</script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: linear-gradient(to top, #050A1F 0%, #1A2B56 100%); color: #FFFFFF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; }
        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .header { display: flex; align-items: center; margin-bottom: 10px; }
        .btn-retour { color: #FFFFFF; text-decoration: none; font-size: 1.5rem; margin-right: 15px; }
        h1 { font-size: 1.5rem; }

        .zone-card { background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        input { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; padding: 12px; color: #FFFFFF; font-size: 1rem; width: 100%; outline: none; margin-bottom: 15px; }
        .btn { background-color: #3B82F6; border: none; padding: 16px; border-radius: 10px; color: #FFFFFF; font-weight: bold; width: 100%; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }

        #scanner-box { display: none; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 12px; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; }

        /* Bloc visuel du Mode Rafale */
        #bloc-rafale-liste { display: none; flex-direction: column; width: 100%; background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 12px; margin-top: 15px; }
        .rafale-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .rafale-count { background: #10B981; color: white; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .rafale-items { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .rafale-item { background: rgba(255, 255, 255, 0.05); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; color: #93C5FD; font-family: monospace; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }

        .report-section { display: none; flex-direction: column; gap: 12px; }
        .badge-count { padding: 15px; border-radius: 10px; font-weight: bold; display: flex; flex-direction: column; gap: 5px; }
        .bg-found { background: rgba(16, 185, 129, 0.2); color: #34D399; border: 1px solid #10B981; }
        .bg-missing { background: rgba(239, 68, 68, 0.2); color: #FCA5A5; border: 1px solid #EF4444; }
        .bg-wrong { background: rgba(245, 158, 11, 0.2); color: #FDE047; border: 1px solid #F59E0B; }
        .item-list { max-height: 120px; overflow-y: auto; font-size: 0.85rem; color: #D1D5DB; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><a href="index.html" class="btn-retour">⬅</a><h1>Audit de Zone</h1></div>
        
        <div class="zone-card" id="step-1">
            <p style="margin-bottom: 10px; font-size: 0.95rem; color: #D1D5DB;">Entrez l'emplacement exact à auditer :</p>
            <input type="text" id="input-zone" placeholder="Ex: Réserve C">
            <button class="btn" id="btn-demarrer-audit">📋 Démarrer le pointage</button>
        </div>

        <div id="scanner-box">
            <div id="reader"></div>

            <div id="bloc-rafale-liste">
                <div class="rafale-header">
                    <span>Objets pointés :</span>
                    <span class="rafale-count" id="rafale-count">0</span>
                </div>
                <div class="rafale-items" id="rafale-items"></div>
            </div>

            <button class="btn" id="btn-cloturer-audit" style="margin-top: 15px; background: #10B981;">📊 Terminer et générer le rapport</button>
        </div>

        <div class="report-section" id="bloc-rapport">
            <h2 style="font-size: 1.2rem; color: #60A5FA;">Résultat pour "<span id="nom-zone-rapport"></span>"</h2>
            
            <div class="badge-count bg-found">
                <div>🟢 Confirmés sur place : <span id="count-trouve" style="float:right;">0</span></div>
            </div>
            
            <div class="badge-count bg-missing">
                <div>🔴 Manquants (Alerte) : <span id="count-manquant" style="float:right;">0</span></div>
                <div class="item-list" id="list-manquants"></div>
            </div>
            
            <div class="badge-count bg-wrong">
                <div>🟡 Égarés (Mal rangés) : <span id="count-egare" style="float:right;">0</span></div>
                <div class="item-list" id="list-egares"></div>
            </div>
            
            <button class="btn" onclick="window.location.reload()" style="background: transparent; border: 1px solid #D1D5DB;">Refaire un audit</button>
        </div>
    </div>

    <script>
        let zoneCible = ""; let baseLocale = []; let scannedRefs = []; let scanner;

        // 🌟 FONCTION DE NETTOYAGE (Enlève majuscules, espaces et accents pour éviter les fausses erreurs)
        function normaliserTexte(txt) {
            if (!txt) return "";
            return String(txt).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        document.getElementById('btn-demarrer-audit').addEventListener('click', function() {
            zoneCible = document.getElementById('input-zone').value;
            if(!zoneCible.trim()) return alert("Spécifiez une zone.");
            
            if(localStorage.getItem('miroir_stock')) {
                baseLocale = JSON.parse(localStorage.getItem('miroir_stock'));
                ouvrirScannerAudit();
            } else {
                alert("Base de données locale introuvable. Ouvrez la page d'accueil avec du réseau pour la synchroniser.");
            }
        });

        function ouvrirScannerAudit() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('scanner-box').style.display = 'block';
            document.getElementById('bloc-rafale-liste').style.display = 'flex'; 
            
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
            scanner.render((text) => {
                let ref = String(text).trim().toUpperCase(); // Forcer en texte pur
                if(!scannedRefs.includes(ref)) {
                    scannedRefs.push(ref);
                    if(navigator.vibrate) navigator.vibrate(150);
                    
                    document.getElementById('rafale-count').textContent = scannedRefs.length;
                    const item = document.createElement('div');
                    item.className = 'rafale-item';
                    item.innerHTML = `<span>${ref}</span> <span style="color: #10B981; font-size: 1.1rem;">✔️</span>`;
                    document.getElementById('rafale-items').prepend(item);
                }
            });
        }

        document.getElementById('btn-cloturer-audit').addEventListener('click', function() {
            if(scanner) scanner.clear(); document.getElementById('scanner-box').style.display = 'none';
            document.getElementById('nom-zone-rapport').textContent = zoneCible;
            
            let zoneCiblePropre = normaliserTexte(zoneCible);
            
            // 🌟 FILTRAGE ULTRA ROBUSTE
            let attendusIci = baseLocale.filter(a => normaliserTexte(a.emplacement) === zoneCiblePropre && !a.estSorti);
            let trouves = 0; let manquants = []; let egares = [];

            // Vérifier ce qui manque
            attendusIci.forEach(a => { 
                let dbRef = String(a.reference).trim().toUpperCase();
                if(scannedRefs.includes(dbRef)) trouves++; 
                else manquants.push(`${a.nom} (${a.reference})`); 
            });

            // Vérifier ce qui est égaré
            scannedRefs.forEach(ref => {
                let match = baseLocale.find(a => String(a.reference).trim().toUpperCase() === ref);
                if(match) {
                    if(normaliserTexte(match.emplacement) !== zoneCiblePropre) {
                        egares.push(`${match.nom} (Prévu: ${match.emplacement})`);
                    }
                } else {
                    egares.push(`Réf ${ref} (Inconnue en base)`);
                }
            });

            document.getElementById('count-trouve').textContent = trouves;
            document.getElementById('count-manquant').textContent = manquants.length;
            document.getElementById('list-manquants').innerHTML = manquants.join('<br>') || "Aucun objet manquant.";
            
            document.getElementById('count-egare').textContent = egares.length;
            document.getElementById('list-egares').innerHTML = egares.join('<br>') || "Aucun objet égaré.";
            
            document.getElementById('bloc-rapport').style.display = 'flex';
        });
    </script>
</body>
</html>
