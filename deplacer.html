<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Déplacer un Objet</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if (!localStorage.getItem('app_token') || !localStorage.getItem('app_login')) { 
            window.location.href = 'login.html'; 
        }
        if (localStorage.getItem('app_role') === 'lecteur') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        /* 🎨 PALETTE "SLATE" ET VARIABLES GLASSMORPHISM */
        :root {
            --bg-dark: #0F172A; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --accent-blue: #3B82F6;
            --accent-blue-hover: #2563EB;
            --accent-orange: #F59E0B;
            --accent-orange-hover: #D97706;
            --accent-red: rgba(239, 68, 68, 0.1);
            --accent-red-border: rgba(248, 113, 113, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            padding-bottom: 50px; position: relative; 
        }

        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .btn-retour { color: var(--text-main); text-decoration: none; font-size: 1.5rem; position: absolute; left: 0; background: none; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-retour:active { transform: scale(0.85); }
        h1 { text-align: center; font-size: 1.5rem; width: 100%; letter-spacing: 1px; font-weight: 800; text-transform: uppercase; }

        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px 20px; 
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .row-inline { display: flex; gap: 8px; align-items: flex-end; }
        .row-inline input { flex: 1; }
        
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            background-color: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); 
            border-radius: 10px; padding: 14px; color: var(--text-main); font-size: 1rem; width: 100%; 
            outline: none; transition: border-color 0.2s, background-color 0.2s; 
        }
        input:focus, select:focus { border-color: #60A5FA; background-color: rgba(0, 0, 0, 0.3); }
        option { background-color: #1E293B; color: white; }

        .btn-scan-input { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 10px; color: white; font-size: 1.3rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; width: 55px; height: 50px; 
            transition: transform 0.2s, background-color 0.2s; 
        }
        .btn-scan-input:active { background: var(--glass-highlight); transform: scale(0.9); }

        .btn-action { 
            background-color: var(--accent-blue); border: none; padding: 16px; border-radius: 12px; 
            color: #FFFFFF; font-weight: bold; font-size: 1.05rem; cursor: pointer; width: 100%; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-action:active { transform: scale(0.96); background-color: var(--accent-blue-hover); }
        .btn-action:disabled { background-color: #64748B; cursor: not-allowed; box-shadow: none; transform: scale(1); }

        .btn-warning { background-color: var(--accent-orange); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .btn-warning:active { background-color: var(--accent-orange-hover); }

        #scanner-box { display: none; background: rgba(0, 0, 0, 0.4); padding: 10px; border-radius: 16px; border: 1px solid var(--glass-border); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; }

        /* Éléments de vérification et Hors-ligne */
        .preview-card { display: none; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); padding: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .preview-card span { font-weight: bold; color: #60A5FA; }

        .offline-badge { display: none; background: var(--accent-red); border: 1px solid var(--accent-red-border); color: #FCA5A5; padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 1.4; margin-bottom: 10px; }

        /* Bouton d'Aide Global Flottant */
        .btn-global-help { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; text-decoration: none; color: var(--text-main); box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 1000; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s; }
        .btn-global-help:active { transform: scale(0.85); background-color: var(--glass-highlight); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-dark); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-title { font-size: 1.2rem; color: white; margin-bottom: 10px; font-weight: 800; }
        .modal-message { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
        .btn-modal-ok { background: var(--accent-blue); border: none; color: #FFFFFF; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.05rem; }

        .app-version { position: absolute; bottom: 10px; left: 15px; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
    </style>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <div class="header"><button class="btn-retour" onclick="triggerHaptic(); history.back()">⬅</button><h1>Déplacer un Objet</h1></div>

        <div id="offline-badge" class="offline-badge">
            📡 Mode Hors-ligne actif.<br><span style="font-weight:normal; font-size:0.8rem;">Vos mouvements sont sauvegardés et seront synchronisés automatiquement.</span>
        </div>

        <div id="scanner-box">
            <div id="reader"></div>
            <button type="button" class="btn-action" onclick="fermerScannerCam()" style="background:var(--accent-red); border:1px solid var(--accent-red-border); color:#FCA5A5; margin-top:10px; padding:12px; box-shadow:none;">❌ Annuler le scan</button>
        </div>

        <form id="form-deplacer" class="glass-card">
            <div class="form-group">
                <label for="input-ref">Référence de l'article</label>
                <div class="row-inline">
                    <input type="text" id="input-ref" placeholder="Scanner ou taper le code..." required>
                    <button type="button" class="btn-scan-input" onclick="ouvrirScannerCam()" title="Ouvrir l'appareil photo">📷</button>
                </div>
            </div>

            <button type="button" class="btn-action" id="btn-verifier-ref" style="background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-size:0.95rem; box-shadow:none;">🔍 Vérifier l'article</button>

            <div id="preview-objet" class="preview-card">
                <p>📦 Objet : <span id="preview-nom">...</span></p>
                <p>📍 Lieu Actuel : <span id="preview-lieu" style="color: #F59E0B;">...</span></p>
            </div>

            <div class="form-group">
                <label for="select-destination">Nouvel Emplacement (Destination)</label>
                <select id="select-destination" required>
                    <option value="">Chargement des zones...</option>
                </select>
            </div>

            <button type="submit" class="btn-action btn-warning" id="btn-submit-form" disabled>🔄 Confirmer le déplacement</button>
        </form>
    </div>

    <a href="aide.html" class="btn-global-help" title="Centre d'aide" onclick="triggerHaptic()">❓</a>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">✅</div>
            <h3 class="modal-title" id="modal-title">Effectué !</h3>
            <p class="modal-message" id="modal-text">Le mouvement a bien été enregistré.</p>
            <button class="btn-modal-ok" id="btn-fermer-modal" onclick="triggerHaptic()">OK</button>
        </div>
    </div>

    <div class="app-version" id="version-display"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        const payloadBase = { login: localStorage.getItem('app_login'), token: localStorage.getItem('app_token') };
        let html5QrcodeScanner = null;

        document.getElementById('version-display').textContent = "Version " + (localStorage.getItem('app_version') || '0.2.1');

        // 🌟 RETOUR HAPTIQUE GLOBAL
        window.triggerHaptic = function() { if (navigator.vibrate) { navigator.vibrate(40); } };

        function afficherAlerte(titre, message, isSuccess = true) {
            document.getElementById('modal-icon').textContent = isSuccess ? "✅" : "⚠️";
            document.getElementById('modal-title').textContent = titre;
            document.getElementById('modal-text').textContent = message;
            document.getElementById('custom-modal').style.display = 'flex';
            triggerHaptic();
        }
        document.getElementById('btn-fermer-modal').addEventListener('click', () => { document.getElementById('custom-modal').style.display = 'none'; });

        // 🌟 NOUVEAU : GESTION DE LA FILE D'ATTENTE HORS-LIGNE
        function checkOfflineQueue() {
            let queue = JSON.parse(localStorage.getItem('app_offline_queue_moves') || '[]');
            if (!navigator.onLine) {
                document.getElementById('offline-badge').style.display = 'block';
            } else {
                document.getElementById('offline-badge').style.display = 'none';
                if (queue.length > 0) {
                    processOfflineQueue(queue);
                }
            }
        }

        function processOfflineQueue(queue) {
            let remaining = [];
            afficherAlerte("Synchronisation", `Envoi de ${queue.length} mouvement(s) en attente...`, true);
            
            let promises = queue.map(payload => {
                return fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
                    .then(res => res.json())
                    .catch(err => { remaining.push(payload); }); // Si échec réseau réel, on le garde
            });
            
            Promise.all(promises).then(() => {
                localStorage.setItem('app_offline_queue_moves', JSON.stringify(remaining));
                if(remaining.length === 0) {
                    setTimeout(() => afficherAlerte("Succès", "Tous les mouvements hors-ligne ont été synchronisés !"), 1500);
                }
            });
        }

        window.addEventListener('online', checkOfflineQueue);
        window.addEventListener('offline', checkOfflineQueue);

        // 🌟 RECHARGE DES EMPLACEMENTS OFFICIELS (Avec mise en cache pour le Hors-Ligne)
        window.addEventListener('DOMContentLoaded', () => {
            checkOfflineQueue();

            function peuplerSelect(data) {
                const empSelect = document.getElementById('select-destination');
                empSelect.innerHTML = '<option value="">-- Choisir la destination --</option>';
                data.forEach(e => empSelect.innerHTML += `<option value="${e}">${e}</option>`);
            }

            // Tente le réseau, sinon lit le cache local
            if (navigator.onLine) {
                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "get_emplacements", ...payloadBase }) })
                .then(r => r.json()).then(d => {
                    if (d.result === "success") {
                        d.data.sort((a, b) => a.localeCompare(b));
                        localStorage.setItem('app_emplacements_cache', JSON.stringify(d.data));
                        peuplerSelect(d.data);
                    }
                }).catch(() => {
                    let cache = JSON.parse(localStorage.getItem('app_emplacements_cache') || '[]');
                    peuplerSelect(cache);
                });
            } else {
                let cache = JSON.parse(localStorage.getItem('app_emplacements_cache') || '[]');
                peuplerSelect(cache);
            }
        });

        // 🌟 RECHERCHE DE SÉCURITÉ / VÉRIFICATION DE LA RÉFÉRENCE SAISIE
        document.getElementById('btn-verifier-ref').addEventListener('click', executerVerificationRef);
        
        function executerVerificationRef() {
            triggerHaptic();
            const ref = document.getElementById('input-ref').value.trim().toUpperCase();
            if(!ref) return afficherAlerte("Attention", "Veuillez d'abord saisir ou scanner une référence.", false);

            const btnVerif = document.getElementById('btn-verifier-ref');
            
            // Si Hors-ligne : On autorise le déplacement à l'aveugle
            if (!navigator.onLine) {
                document.getElementById('preview-nom').textContent = "Inconnu (Hors-Ligne)";
                document.getElementById('preview-lieu').textContent = "Inconnu";
                document.getElementById('preview-objet').style.display = 'block';
                document.getElementById('btn-submit-form').disabled = false;
                return;
            }

            btnVerif.textContent = "Interrogation... ⏳";
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "rechercher", reference: ref, ...payloadBase }) })
            .then(res => res.json()).then(data => {
                btnVerif.textContent = "🔍 Vérifier l'article";
                if(data.result === "success") {
                    if (data.estSorti) {
                        afficherAlerte("Article Archivé", "Cet objet est enregistré comme étant SORTI du stock ! Réintégration requise.", false);
                        remiseAZeroVerification();
                    } else {
                        document.getElementById('preview-nom').textContent = data.nom;
                        document.getElementById('preview-lieu').textContent = data.emplacement;
                        document.getElementById('preview-objet').style.display = 'block';
                        document.getElementById('btn-submit-form').disabled = false;
                    }
                } else {
                    afficherAlerte("Introuvable", "Cette référence n'existe pas en base.", false);
                    remiseAZeroVerification();
                }
            }).catch(() => {
                // Si la requête échoue (micro-coupure réseau par ex), on autorise le forçage
                btnVerif.textContent = "🔍 Vérifier l'article";
                document.getElementById('preview-nom').textContent = "Forçage Hors-Ligne";
                document.getElementById('preview-lieu').textContent = "Non vérifié";
                document.getElementById('preview-objet').style.display = 'block';
                document.getElementById('btn-submit-form').disabled = false;
            });
        }

        function remiseAZeroVerification() {
            document.getElementById('preview-objet').style.display = 'none';
            document.getElementById('btn-submit-form').disabled = true;
        }

        document.getElementById('input-ref').addEventListener('input', remiseAZeroVerification);

        // 🌟 APPAREIL PHOTO / LECTEUR
        function ouvrirScannerCam() {
            triggerHaptic();
            document.getElementById('form-deplacer').style.display = 'none';
            document.getElementById('scanner-box').style.display = 'block';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText) {
            document.getElementById('input-ref').value = decodedText.trim().toUpperCase();
            fermerScannerCam();
            triggerHaptic();
            executerVerificationRef(); 
        }

        function onScanFailure(error) {}

        function fermerScannerCam() {
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }
            document.getElementById('scanner-box').style.display = 'none';
            document.getElementById('form-deplacer').style.display = 'flex';
        }

        // 🌟 SOUMISSION FINALE DU MOUVEMENT (Avec interception Hors-Ligne)
        document.getElementById('form-deplacer').addEventListener('submit', function(e) {
            e.preventDefault();
            triggerHaptic();
            const btnSubmit = document.getElementById('btn-submit-form');
            const destination = document.getElementById('select-destination').value;
            const ref = document.getElementById('input-ref').value.trim().toUpperCase();

            if(!destination) return afficherAlerte("Attention", "Sélectionnez un emplacement de destination.", false);

            let payload = { action: "deplacer", reference: ref, nouvelEmplacement: destination, ...payloadBase, timestamp: Date.now() };

            if (!navigator.onLine) {
                // MISE EN FILE D'ATTENTE LOCALE
                let queue = JSON.parse(localStorage.getItem('app_offline_queue_moves') || '[]');
                queue.push(payload);
                localStorage.setItem('app_offline_queue_moves', JSON.stringify(queue));
                afficherAlerte("Sauvegardé Localement", `Le réseau est coupé. Transféré vers : <b>${destination}</b> (Sera envoyé plus tard).`);
                document.getElementById('form-deplacer').reset();
                remiseAZeroVerification();
                checkOfflineQueue();
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Mise à jour... ⏳";

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    afficherAlerte("Mouvement Validé", `Transféré vers : <b>${destination}</b>`);
                    document.getElementById('form-deplacer').reset();
                    remiseAZeroVerification();
                    btnSubmit.textContent = "🔄 Confirmer le déplacement";
                } else {
                    afficherAlerte("Échec", data.message, false);
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = "🔄 Confirmer le déplacement";
                }
            }).catch(() => {
                // Secours ultime si coupure pendant l'envoi
                let queue = JSON.parse(localStorage.getItem('app_offline_queue_moves') || '[]');
                queue.push(payload);
                localStorage.setItem('app_offline_queue_moves', JSON.stringify(queue));
                afficherAlerte("Réseau perdu", "Le mouvement a été sécurisé dans la file d'attente hors-ligne.", false);
                document.getElementById('form-deplacer').reset();
                remiseAZeroVerification();
                btnSubmit.textContent = "🔄 Confirmer le déplacement";
                checkOfflineQueue();
            });
        });
    </script>
    <script>
        let timeoutId; document.addEventListener("visibilitychange", function() { if (document.hidden) { timeoutId = setTimeout(() => { localStorage.clear(); window.location.href = "login.html"; }, 30000); } else { clearTimeout(timeoutId); } });
    </script>
</body>
</html>
