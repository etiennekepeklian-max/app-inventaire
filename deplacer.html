<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Déplacer un Objet</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B56">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if (!localStorage.getItem('app_token') || !localStorage.getItem('app_login')) { 
            window.location.href = 'login.html'; 
        }
        if (localStorage.getItem('app_role') === 'lecteur') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(to top, #050A1F 0%, #1A2B56 100%); color: #FFFFFF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; position: relative; }
        .container { width: 90%; max-width: 450px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        /* Header avec retour arrière intelligent */
        .header { display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .btn-retour { color: #FFFFFF; text-decoration: none; font-size: 1.5rem; position: absolute; left: 0; background: none; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-retour:active { transform: scale(0.85); }
        h1 { text-align: center; font-size: 1.5rem; width: 100%; letter-spacing: 1px; }

        .form-card { background: rgba(0, 0, 0, 0.2); border-radius: 14px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
        .row-inline { display: flex; gap: 8px; align-items: flex-end; }
        .row-inline input { flex: 1; }
        
        label { font-size: 0.85rem; color: #D1D5DB; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; padding: 12px; color: #FFFFFF; font-size: 1rem; width: 100%; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #60A5FA; background-color: rgba(255, 255, 255, 0.15); }
        option { background-color: #1A2B56; color: white; }

        .btn-scan-input { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; padding: 12px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 50px; height: 48px; transition: background 0.2s; }
        .btn-scan-input:active { background: rgba(255, 255, 255, 0.25); }

        .btn-action { background-color: #3B82F6; border: none; padding: 16px; border-radius: 10px; color: #FFFFFF; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: transform 0.2s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-action:active { transform: scale(0.95); }
        .btn-action:disabled { background-color: #6B7280; cursor: not-allowed; box-shadow: none; }

        #scanner-box { display: none; background: rgba(0, 0, 0, 0.4); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; }

        /* Éléments de vérification d'objet */
        .preview-card { display: none; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); padding: 12px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; }
        .preview-card span { font-weight: bold; color: #60A5FA; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background-color: #1A2B56; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-title { font-size: 1.2rem; color: white; margin-bottom: 10px; }
        .modal-message { color: #D1D5DB; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
        .btn-modal-ok { background: #3B82F6; border: none; color: #FFFFFF; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.05rem; }

        .app-version { position: absolute; bottom: 10px; right: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: bold; }
    </style>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <div class="header"><button class="btn-retour" onclick="history.back()">⬅</button><h1>Déplacer un Objet</h1></div>

        <div id="scanner-box">
            <div id="reader"></div>
            <button type="button" class="btn-action" onclick="fermerScannerCam()" style="background:transparent; border:1px solid #EF4444; color:#FCA5A5; margin-top:10px; padding:10px;">❌ Annuler le scan</button>
        </div>

        <form id="form-deplacer" class="form-card">
            <div class="form-group">
                <label for="input-ref">Référence de l'article</label>
                <div class="row-inline">
                    <input type="text" id="input-ref" placeholder="Scanner ou taper le code..." required>
                    <button type="button" class="btn-scan-input" onclick="ouvrirScannerCam()" title="Ouvrir l'appareil photo">📷</button>
                </div>
            </div>

            <button type="button" class="btn-action" id="btn-verifier-ref" style="background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-size:0.9rem; padding:10px;">🔍 Vérifier l'article</button>

            <div id="preview-objet" class="preview-card">
                <p>📦 Objet : <span id="preview-nom">...</span></p>
                <p>📍 Lieu Actuel : <span id="preview-lieu" style="color: #F59E0B;">...</span></p>
            </div>

            <div class="form-group">
                <label for="select-destination">Nouvel Emplacement (Destination)</label>
                <select id="select-destination" required>
                    <option value="">Chargement des zones...</option>
                </select>
            </div>

            <button type="submit" class="btn-action" id="btn-submit-form" style="background-color: #F59E0B; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);" disabled>🔄 Confirmer le déplacement</button>
        </form>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">✅</div>
            <h3 class="modal-title" id="modal-title">Effectué !</h3>
            <p class="modal-message" id="modal-text">Le mouvement a bien été enregistré.</p>
            <button class="btn-modal-ok" id="btn-fermer-modal">OK</button>
        </div>
    </div>

    <div class="app-version" id="version-display"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYal6V4YSCqCMy7iuHOaeXz0vg09nsMAj-lcqnMI7ORUytTC8-Ti1amhsBsaYunkZm/exec";
        const payloadBase = { login: localStorage.getItem('app_login'), token: localStorage.getItem('app_token') };
        let html5QrcodeScanner = null;

        document.getElementById('version-display').textContent = "Version " + (localStorage.getItem('app_version') || '0.1.1');

        function afficherPopup(titre, message, isSuccess = true) {
            document.getElementById('modal-icon').textContent = isSuccess ? "✅" : "⚠️";
            document.getElementById('modal-title').textContent = titre;
            document.getElementById('modal-text').textContent = message;
            document.getElementById('custom-modal').style.display = 'flex';
        }
        document.getElementById('btn-fermer-modal').addEventListener('click', () => { document.getElementById('custom-modal').style.display = 'none'; });

        // 🌟 RECHARGE DES EMPLACEMENTS OFFICIELS DANS LE MENU DÉROULANT
        window.addEventListener('DOMContentLoaded', () => {
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "get_emplacements", ...payloadBase }) })
            .then(r => r.json()).then(d => {
                if (d.result === "success") {
                    d.data.sort((a, b) => a.localeCompare(b));
                    const empSelect = document.getElementById('select-destination');
                    empSelect.innerHTML = '<option value="">-- Choisir la destination --</option>';
                    d.data.forEach(e => empSelect.innerHTML += `<option value="${e}">${e}</option>`);
                }
            });
        });

        // 🌟 RECHERCHE DE SÉCURITÉ / VÉRIFICATION DE LA RÉFÉRENCE SAISIE
        document.getElementById('btn-verifier-ref').addEventListener('click', executerVerificationRef);
        
        function executerVerificationRef() {
            const ref = document.getElementById('input-ref').value.trim().toUpperCase();
            if(!ref) return afficherPopup("Attention", "Veuillez d'abord saisir ou scanner une référence.", false);

            const btnVerif = document.getElementById('btn-verifier-ref');
            btnVerif.textContent = "Interrogation de la base... ⏳";

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "rechercher", reference: ref, ...payloadBase }) })
            .then(res => res.json()).then(data => {
                btnVerif.textContent = "🔍 Vérifier l'article";
                if(data.result === "success") {
                    if (data.estSorti) {
                        afficherPopup("Article Archivé", "Cet objet est enregistré comme étant SORTI du stock ! Veuillez le réintégrer depuis le module de recherche si nécessaire.", false);
                        remiseAZeroVerification();
                    } else {
                        document.getElementById('preview-nom').textContent = data.nom;
                        document.getElementById('preview-lieu').textContent = data.emplacement;
                        document.getElementById('preview-objet').style.display = 'block';
                        document.getElementById('btn-submit-form').disabled = false;
                    }
                } else {
                    afficherPopup("Introuvable", "Cette référence n'existe pas dans la base de données.", false);
                    remiseAZeroVerification();
                }
            }).catch(() => {
                btnVerif.textContent = "🔍 Vérifier l'article";
                afficherPopup("Erreur réseau", "Impossible de joindre le serveur principal.", false);
                remiseAZeroVerification();
            });
        }

        function remiseAZeroVerification() {
            document.getElementById('preview-objet').style.display = 'none';
            document.getElementById('btn-submit-form').disabled = true;
        }

        document.getElementById('input-ref').addEventListener('input', remiseAZeroVerification);

        // 🌟 APPAREIL PHOTO / LECTEUR DE LOGICIEL QR
        function ouvrirScannerCam() {
            document.getElementById('form-deplacer').style.display = 'none';
            document.getElementById('scanner-box').style.display = 'block';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText) {
            document.getElementById('input-ref').value = decodedText.trim().toUpperCase();
            fermerScannerCam();
            if (navigator.vibrate) navigator.vibrate(100);
            executerVerificationRef(); // Déclenche automatiquement la vérification après le scan
        }

        function onScanFailure(error) {}

        function fermerScannerCam() {
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }
            document.getElementById('scanner-box').style.display = 'none';
            document.getElementById('form-deplacer').style.display = 'flex';
        }

        // 🌟 SOUMISSION FINALE DU MOUVEMENT
        document.getElementById('form-deplacer').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit-form');
            const destination = document.getElementById('select-destination').value;
            const ref = document.getElementById('input-ref').value.trim().toUpperCase();

            if(!destination) return afficherPopup("Attention", "Veuillez sélectionner un emplacement de destination.", false);

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Mise à jour du registre... ⏳";

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "deplacer",
                    reference: ref,
                    nouvelEmplacement: destination,
                    ...payloadBase
                })
            }).then(res => res.json()).then(data => {
                if(data.result === "success") {
                    afficherPopup("Mouvement Validé", `L'objet a bien été transféré vers : <b>${destination}</b>`);
                    document.getElementById('form-deplacer').reset();
                    remiseAZeroVerification();
                    btnSubmit.textContent = "🔄 Confirmer le déplacement";
                } else {
                    afficherPopup("Échec", data.message, false);
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = "🔄 Confirmer le déplacement";
                }
            }).catch(() => {
                afficherPopup("Erreur réseau", "Le mouvement n'a pas pu être enregistré sur le serveur.", false);
                btnSubmit.disabled = false;
                btnSubmit.textContent = "🔄 Confirmer le déplacement";
            });
        });
    </script>
    <script>
        let timeoutId; document.addEventListener("visibilitychange", function() { if (document.hidden) { timeoutId = setTimeout(() => { localStorage.clear(); window.location.href = "login.html"; }, 30000); } else { clearTimeout(timeoutId); } });
    </script>
</body>
</html>
